<div class="container">
    <div class="row">
        <div class="col-lg-4 mb-3" *ngFor="let movie of movies$ | async">
            <div class="card">
                <img src="assets/thor.png" class="card-imp-top" alt="">
                <div class="card-body">
                  <h5 class="card-title">{{movie.name}}</h5>
                  <p class="card-test">{{movie.description}}</p>
                  <a class="btn btn-outline-success btn-small">BUY</a>               
                </div>
            </div>
        </div>
    </div>
</div>
